# Satellite project crew — 2 AI on a single machine: codex implements, claude reviews.
#
# min_approvals = 1: one reviewer approval can land. Raise to 2 only if you add a second
# DISTINCT-vendor reviewer role (see crew-main.toml's audit = agy pattern).
#
# Quota resilience: codex backs up to agy. Every fleet machine installs all four CLIs
# (codex/claude/opencode/agy) for the main project, so agy is available here too — a codex
# rate-limit auto-substitutes agy for the implement role instead of escalating, and claude
# still reviews a DIFFERENT vendor's work (no self-review). opencode is intentionally left
# out of automated roles because its headless mode hangs.
pipeline = ["implement", "review"]

[gate]
min_approvals = 1
max_rounds = 3
on_flake = "exclude"

# Replace with the satellite project's real test command before relying on auto-land.
[test]
command = "cargo test --quiet"

[roles.implement]
agent = "codex"

[roles.review]
agent = "claude"
blind = true

[agents.codex]
timeout = 120
backup = "agy"

[agents.claude]
timeout = 150

[agents.agy]
timeout = 180

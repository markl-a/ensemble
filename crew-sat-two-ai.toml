# Satellite project crew — 2 AI on a single machine: codex implements,
# claude reviews, and codex supplies the second reviewer role.
#
# Phase 2 satellite invariant: keep the minimal codex+claude CLI set, but still
# require two distinct reviewer vendors before landing.
pipeline = ["implement", "review", "audit"]

[gate]
min_approvals = 2
max_rounds = 3
on_flake = "exclude"

# Replace with the satellite project's real test command before relying on auto-land.
[test]
command = "cargo test --quiet"

[roles.implement]
agent = "codex"

[roles.review]
agent = "claude"
blind = true

[roles.audit]
agent = "codex"
blind = true

[agents.codex]
timeout = 120

[agents.claude]
timeout = 150

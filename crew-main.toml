# min_approvals = 2 requires TWO reviewer roles, so the gate can actually reach quorum
# with two DISTINCT vendors (claude + agy). codex implements; opencode is excluded from
# automated roles because its headless mode hangs.
pipeline = ["implement", "review", "audit"]

[gate]
min_approvals = 2
max_rounds = 2
on_flake = "exclude"
stall_limit = 0
max_task_secs = 0

# Keep governance requirements explicit for acceptance/release verification runs.
[test]
command = "cargo test --quiet"

[roles.implement]
agent = "codex"

[roles.review]
agent = "claude"
blind = true

[roles.audit]
agent = "agy"
blind = true

# Quota resilience: if a vendor returns a rate-limit/quota error, the conductor
# auto-substitutes its backup (a DIFFERENT vendor) once for that role, rather than
# escalating the whole run. agy (Antigravity) is an independent quota pool, so it
# backs up the OpenAI-based codex and the Anthropic-based claude.
[agents.codex]
timeout = 60
backup = "agy"

[agents.claude]
timeout = 60
backup = "agy"

[agents.agy]
timeout = 180
